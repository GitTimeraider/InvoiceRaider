<!doctype html>
<html
  lang="%lang%"
  data-number-format="%numberFormat%"
  data-date-format="%dateFormat%"
>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InvoiceRaider</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var legacyMap = {
            "invio-dark": "invoiceraider-dark",
            "invio-light": "invoiceraider-light",
          };
          if (stored && legacyMap[stored]) {
            stored = legacyMap[stored];
            localStorage.setItem("theme", stored);
          }
          var preferredDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          var fallback = preferredDark ? "invoiceraider-dark" : "invoiceraider-light";
          var theme = stored || fallback;
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_err) {
          document.documentElement.setAttribute("data-theme", "invoiceraider-dark");
        }
      })();
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="bg-base-200 text-base-content min-h-screen"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
